databases:
  - name: student-grade-db
    plan: free

services:
  - type: web
    name: student-grade-query-system
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: student-grade-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true
